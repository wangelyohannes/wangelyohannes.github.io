<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Wangel Yohannes | Wandering Yonko | ITIS 3135 | Introduction Form
    </title>

    <link rel="stylesheet" href="styles/default.css" />
    <link rel="stylesheet" href="styles/intro_form.css" />

    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>

  <body>
    <div data-include="components/header.html"></div>

    <main>
      <h2 id="page-title">Introduction Form</h2>
      <h3 id="form-subtitle">Please submit the form below.</h3>

      <form id="intro-form">
        <fieldset>
          <legend>Name and Mascot</legend>

          <label for="first-name">First Name</label>
          <input
            type="text"
            id="first-name"
            value="Wangel"
            placeholder="Enter first name"
            required
          />

          <label for="middle-name">Middle Name or Initial (optional)</label>
          <input
            type="text"
            id="middle-name"
            value=""
            placeholder="Enter middle name or initial"
          />

          <label for="nickname">Nickname / Preferred Name (optional)</label>
          <input
            type="text"
            id="nickname"
            value=""
            placeholder="Enter nickname or preferred name"
          />

          <label for="last-name">Last Name</label>
          <input
            type="text"
            id="last-name"
            value="Yohannes"
            placeholder="Enter last name"
            required
          />

          <label for="ack-statement">Acknowledgment Statement</label>
          <input
            type="text"
            id="ack-statement"
            value="I understand that what is on this page is not password protected and I will not put anything here that I do not want publicly available."
            placeholder="Enter acknowledgment statement"
            required
          />

          <label for="ack-date">Acknowledgment Date</label>
          <input
            type="text"
            id="ack-date"
            value="2026-01-22"
            placeholder="YYYY-MM-DD"
            pattern="\d{4}-\d{2}-\d{2}"
            required
          />

          <label for="mascot-adj">Mascot Adjective</label>
          <input
            type="text"
            id="mascot-adj"
            value="Wandering"
            placeholder="Enter mascot adjective"
            required
          />

          <label for="mascot-animal">Mascot Animal</label>
          <input
            type="text"
            id="mascot-animal"
            value="Yonko"
            placeholder="Enter mascot animal"
            required
          />

          <label for="divider">Divider</label>
          <input
            type="text"
            id="divider"
            value="|"
            placeholder="Enter divider symbol"
            required
          />
        </fieldset>

        <fieldset>
          <legend>Image and Intro Content</legend>

          <label for="user-image">Upload Picture</label>
          <input type="file" id="user-image" accept="image/*" />

          <input
            type="hidden"
            id="default-image"
            value="images/42F5A85F-440C-47BE-A65C-BBAA2830FF7F_1_105_c.jpeg"
          />

          <label for="caption">Picture Caption</label>
          <input
            type="text"
            id="caption"
            value="Wangel Yohannes"
            placeholder="Enter picture caption"
            required
          />

          <label for="personal-state">Personal Statement</label>
          <textarea
            id="personal-state"
            placeholder="Enter personal statement"
            required
          >
I am a junior at UNC Charlotte majoring in Computer Science with a concentration in Systems and Networks.</textarea
          >

          <label for="personal-bg">Personal Background</label>
          <textarea
            id="personal-bg"
            placeholder="Enter personal background"
            required
          >
I am a Charlotte native and have lived in North Carolina for most of my life. In my free time, I enjoy hiking, exploring nature trails, and going on bike rides.</textarea
          >

          <label for="professional-bg">Professional Background</label>
          <textarea
            id="professional-bg"
            placeholder="Enter professional background"
            required
          >
Over the past year I have worked as a Release Manager, where I support application releases and coordinate technical changes across teams.</textarea
          >

          <label for="academic-bg">Academic Background</label>
          <textarea
            id="academic-bg"
            placeholder="Enter academic background"
            required
          >
I am currently a junior studying Computer Science at UNC Charlotte.</textarea
          >

          <label for="subject-bg">Background in this Subject</label>
          <textarea
            id="subject-bg"
            placeholder="Enter subject background"
            required
          >
I have limited experience with web development, but I am interested in learning more about front-end technologies and how modern web applications are built.</textarea
          >

          <label for="computer-bg">Primary Computer</label>
          <textarea
            id="computer-bg"
            placeholder="Enter primary computer"
            required
          >
My primary work computer is a MacBook Pro with an M1 chip.</textarea
          >

          <label for="backup-computer"
            >Backup Work Computer and Location Plan</label
          >
          <textarea
            id="backup-computer"
            placeholder="Enter backup plan"
            required
          >
My backup computer is an MSI thin gaming laptop.</textarea
          >

          <label for="funny-item">Funny or Interesting Thing (optional)</label>
          <input
            type="text"
            id="funny-item"
            value="I started a business with a few friends, and we take quarterly trips to Japan for several weeks at a time."
            placeholder="Enter funny or interesting thing"
          />

          <label for="share-item"
            >Something I Would Like to Share (optional)</label
          >
          <input
            type="text"
            id="share-item"
            value="I lived in Ethiopia for 4 years."
            placeholder="Enter something else to share"
          />
        </fieldset>

        <fieldset>
          <legend>Courses</legend>

          <div id="courses-container">
            <div class="course-entry">
              <input
                type="text"
                class="course-dept"
                value="ITIS"
                placeholder="Dept"
                required
              />
              <input
                type="text"
                class="course-num"
                value="3200"
                placeholder="Number"
                required
              />
              <input
                type="text"
                class="course-name"
                value="Introduction to Information Security and Privacy"
                placeholder="Course Name"
                required
              />
              <input
                type="text"
                class="course-reason"
                value="Required course for my concentration and it is useful for my career path."
                placeholder="Reason"
                required
              />
              <button type="button" class="delete-course-btn">Delete</button>
            </div>

            <div class="course-entry">
              <input
                type="text"
                class="course-dept"
                value="ITSC"
                placeholder="Dept"
                required
              />
              <input
                type="text"
                class="course-num"
                value="3155"
                placeholder="Number"
                required
              />
              <input
                type="text"
                class="course-name"
                value="Software Engineering"
                placeholder="Course Name"
                required
              />
              <input
                type="text"
                class="course-reason"
                value="Important for learning structured software development in team settings."
                placeholder="Reason"
                required
              />
              <button type="button" class="delete-course-btn">Delete</button>
            </div>

            <div class="course-entry">
              <input
                type="text"
                class="course-dept"
                value="ITIS"
                placeholder="Dept"
                required
              />
              <input
                type="text"
                class="course-num"
                value="3135"
                placeholder="Number"
                required
              />
              <input
                type="text"
                class="course-name"
                value="Front-End Web Application Development"
                placeholder="Course Name"
                required
              />
              <input
                type="text"
                class="course-reason"
                value="I want to improve my web development and front-end skills."
                placeholder="Reason"
                required
              />
              <button type="button" class="delete-course-btn">Delete</button>
            </div>

            <div class="course-entry">
              <input
                type="text"
                class="course-dept"
                value="ITSC"
                placeholder="Dept"
                required
              />
              <input
                type="text"
                class="course-num"
                value="3688"
                placeholder="Number"
                required
              />
              <input
                type="text"
                class="course-name"
                value="Computers and Their Impact on Society"
                placeholder="Course Name"
                required
              />
              <input
                type="text"
                class="course-reason"
                value="Required course that also helps me think about technology in a broader context."
                placeholder="Reason"
                required
              />
              <button type="button" class="delete-course-btn">Delete</button>
            </div>
          </div>

          <button type="button" id="add-course-btn">Add Another Course</button>
        </fieldset>

        <fieldset>
          <legend>Quote and Links</legend>

          <label for="quote">Quote</label>
          <input
            type="text"
            id="quote"
            value="The more you learn, the more you earn."
            placeholder="Enter quote"
            required
          />

          <label for="quote-author">Quote Author</label>
          <input
            type="text"
            id="quote-author"
            value="Warren Buffett"
            placeholder="Enter quote author"
            required
          />

          <div id="links-container">
            <div class="link-entry">
              <input
                type="text"
                class="link-name"
                value="GitHub"
                placeholder="Link Name"
                required
              />
              <input
                type="url"
                class="link-url"
                value="https://github.com/"
                placeholder="URL"
                required
              />
              <button type="button" class="delete-link-btn">Delete</button>
            </div>

            <div class="link-entry">
              <input
                type="text"
                class="link-name"
                value="GitHub Page"
                placeholder="Link Name"
                required
              />
              <input
                type="url"
                class="link-url"
                value="https://wangelyohannes.github.io/"
                placeholder="URL"
                required
              />
              <button type="button" class="delete-link-btn">Delete</button>
            </div>

            <div class="link-entry">
              <input
                type="text"
                class="link-name"
                value="freeCodeCamp"
                placeholder="Link Name"
                required
              />
              <input
                type="url"
                class="link-url"
                value="https://www.freecodecamp.org/"
                placeholder="URL"
                required
              />
              <button type="button" class="delete-link-btn">Delete</button>
            </div>

            <div class="link-entry">
              <input
                type="text"
                class="link-name"
                value="LinkedIn"
                placeholder="Link Name"
                required
              />
              <input
                type="url"
                class="link-url"
                value="https://www.linkedin.com/"
                placeholder="URL"
                required
              />
              <button type="button" class="delete-link-btn">Delete</button>
            </div>

            <div class="link-entry">
              <input
                type="text"
                class="link-name"
                value="Charlotte Webpages"
                placeholder="Link Name"
                required
              />
              <input
                type="url"
                class="link-url"
                value="https://webpages.charlotte.edu/wyohanne/"
                placeholder="URL"
                required
              />
              <button type="button" class="delete-link-btn">Delete</button>
            </div>
          </div>

          <button type="button" id="add-link-btn">Add Another Link</button>

          <div class="form-controls">
            <button type="submit" id="submit-btn">Submit</button>
            <button type="reset" id="reset-btn">Reset</button>
            <button type="button" id="clear-btn">Clear</button>
            <button type="button" id="generate-json-btn">Generate JSON</button>
            <button type="button" id="generate-html-btn">Generate HTML</button>
          </div>
        </fieldset>
      </form>

      <div id="output-container" hidden></div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/HTMLInclude.min.js"></script>
    <script src="scripts/introduction.js"></script>
    <script src="scripts/generate_html.js"></script>
    <script src="scripts/generate_json.js"></script>
  </body>
</html>
